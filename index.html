<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Comic Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* Reset */
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
  body { background:#121212; color:#fff; }

  /* Header */
  header { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#1f1f1f; }
  .logo { font-size:1.8em; font-weight:700; color:#ffcc00; }
  nav a { color:#fff; text-decoration:none; margin-left:25px; font-weight:500; }
  nav a:hover { color:#ffcc00; }
  .search-bar input { padding:5px 10px; border-radius:4px; border:none; outline:none; }

  /* Featured Banner */
  .featured { position:relative; margin:20px; border-radius:10px; overflow:hidden; }
  .featured img { width:100%; max-height:350px; object-fit:cover; filter: brightness(0.7); }
  .featured h2 { position:absolute; bottom:20px; left:30px; font-size:2em; color:#ffcc00; }

  /* Section Titles */
  section { margin:30px; }
  section h3 { font-size:1.5em; margin-bottom:15px; }

  /* Horizontal Scroll Grid */
  .horizontal-scroll { display:flex; overflow-x:auto; gap:15px; padding-bottom:10px; scrollbar-width:none; }
  .horizontal-scroll::-webkit-scrollbar { display:none; }

  .comic-card { min-width:150px; background:#1f1f1f; border-radius:8px; overflow:hidden; position:relative; transition: transform 0.3s; cursor:pointer; }
  .comic-card:hover { transform: translateY(-5px); }
  .comic-card img { width:100%; height:220px; object-fit:cover; }
  .comic-card .title-overlay { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); color:#ffcc00; text-align:center; padding:5px; font-weight:500; }

  /* Footer */
  footer { background:#1f1f1f; text-align:center; padding:25px; margin-top:40px; font-size:0.9em; }
  footer a { color:#ffcc00; margin:0 10px; text-decoration:none; }
  footer a:hover { text-decoration:underline; }

  @media(max-width:600px){
    header { flex-direction:column; align-items:flex-start; }
    nav { margin-top:10px; }
    nav a { margin-left:0; margin-right:15px; display:inline-block; margin-top:5px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">My Comic Hub</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Popular</a>
    <a href="#">New</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
    <span class="search-bar"><input type="text" placeholder="Search comics..."></span>
  </nav>
</header>

<!-- Featured Comic -->
<div class="featured">
  <img src="https://via.placeholder.com/1200x350?text=Featured+Comic" alt="Featured Comic">
  <h2>Featured Comic: The Adventure Begins</h2>
</div>

<!-- Popular Comics -->
<section>
  <h3>Popular Comics</h3>
  <div class="horizontal-scroll">
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+1"><div class="title-overlay">Comic Title 1</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+2"><div class="title-overlay">Comic Title 2</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+3"><div class="title-overlay">Comic Title 3</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+4"><div class="title-overlay">Comic Title 4</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+5"><div class="title-overlay">Comic Title 5</div></div>
  </div>
</section>

<!-- Recently Added Comics -->
<section>
  <h3>Recently Added</h3>
  <div class="horizontal-scroll">
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+6"><div class="title-overlay">Comic Title 6</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+7"><div class="title-overlay">Comic Title 7</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+8"><div class="title-overlay">Comic Title 8</div></div>
    <div class="comic-card"><img src="https://via.placeholder.com/150x220?text=Comic+9"><div class="title-overlay">Comic Title 9</div></div>
  </div>
</section>

<!-- Footer -->
<footer>
  &copy; 2026 My Comic Hub | <a href="#">Privacy Policy</a> | <a href="#">Terms</a>
</footer>

</body>
</html>
